<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}WalletPro{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#6366f1;--primary-dark:#4f46e5;--secondary:#0ea5e9;--bg-dark:#0a0e1a;--bg-card:#111827;--bg-hover:#1a2035;--border:#1e293b;--text-muted:#64748b;--success:#10b981;--danger:#ef4444;--warning:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f1629;color:#e2e8f0;min-height:100vh}
.sidebar{width:240px;background:var(--bg-dark);min-height:100vh;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100}
.sidebar-logo{padding:1.5rem 1.2rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 4px 14px rgba(99,102,241,.4)}
.logo-text h2{font-size:.95rem;font-weight:800;color:#f1f5f9;letter-spacing:-.02em}
.logo-text span{font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.sidebar-nav{padding:1rem .75rem;flex:1;overflow-y:auto}
.nav-section-label{font-size:.58rem;font-weight:700;color:#334155;letter-spacing:.12em;text-transform:uppercase;padding:.6rem .6rem .3rem;margin-top:.5rem}
.nav-link{display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:8px;color:#64748b;font-size:.82rem;font-weight:500;text-decoration:none;transition:all .15s;margin-bottom:.05rem}
.nav-link:hover{background:var(--bg-hover);color:#cbd5e1}
.nav-link.active{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(79,70,229,.08));color:#a5b4fc;border:1px solid rgba(99,102,241,.2);font-weight:600}
.nav-link .ni{font-size:.85rem;width:18px;text-align:center}
.badge-pill{margin-left:auto;background:var(--danger);color:#fff;font-size:.58rem;font-weight:700;padding:.12rem .45rem;border-radius:20px}
.badge-pill.amber{background:var(--warning)}
.sidebar-footer{padding:1rem .75rem;border-top:1px solid var(--border)}
.main-content{margin-left:240px;min-height:100vh;padding:0}
.topbar{background:var(--bg-dark);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:1rem;font-weight:700;color:#f1f5f9}
.content-area{padding:1.5rem}
.card-dark{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;transition:all .2s;cursor:default}
.stat-card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-2px)}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.btn-primary-custom{background:linear-gradient(135deg,var(--primary),var(--primary-dark));border:none;color:#fff;padding:.6rem 1.25rem;border-radius:8px;font-weight:600;font-size:.85rem;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem}
.btn-primary-custom:hover{opacity:.9;transform:translateY(-1px);color:#fff}
.btn-success-sm{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.25);padding:.35rem .8rem;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-success-sm:hover{background:rgba(16,185,129,.2)}
.btn-danger-sm{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.25);padding:.35rem .8rem;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-danger-sm:hover{background:rgba(239,68,68,.2)}
.btn-warning-sm{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.25);padding:.35rem .8rem;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.status-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .65rem;border-radius:20px;font-size:.72rem;font-weight:600}
.status-active{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.status-pending{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.status-rejected{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.status-suspended{background:rgba(100,116,139,.1);color:#64748b;border:1px solid rgba(100,116,139,.2)}
.amount-badge{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:.85rem}
.deposit-badge{color:#10b981}
.withdraw-badge{color:#ef4444}
.table-dark-custom{--bs-table-bg:transparent;--bs-table-striped-bg:rgba(255,255,255,.02);color:#e2e8f0}
.table-dark-custom th{color:#94a3b8;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.table-dark-custom td{border-bottom:1px solid rgba(30,41,59,.5);font-size:.85rem;vertical-align:middle}
.form-control-dark{background:#1a2035;border:1px solid var(--border);color:#e2e8f0;border-radius:8px;padding:.65rem 1rem}
.form-control-dark:focus{background:#1a2035;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15);color:#e2e8f0}
.alert-dark{border:none;border-radius:10px;font-size:.85rem}
.modal-dark .modal-content{background:var(--bg-card);border:1px solid var(--border);border-radius:14px}
.modal-dark .modal-header{border-bottom:1px solid var(--border);padding:1.25rem 1.5rem}
.modal-dark .modal-footer{border-top:1px solid var(--border)}
.modal-dark .modal-title{font-weight:700;color:#f1f5f9}
.balance-display{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;color:#a5b4fc}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.page-title{font-size:1.15rem;font-weight:800;color:#f1f5f9}
.search-box{background:#1a2035;border:1px solid var(--border);color:#e2e8f0;border-radius:8px;padding:.55rem 1rem;font-size:.85rem}
.search-box:focus{outline:none;border-color:var(--primary)}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0}}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% block body %}
{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
