{% extends 'base.html' %}
{% block title %}Login — WalletPro{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0e1a 0%,#0f1629 100%);">
  <div style="width:100%;max-width:420px;padding:1rem;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#4f46e5);display:inline-flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:1rem;box-shadow:0 8px 24px rgba(99,102,241,.4);">💳</div>
      <h1 style="font-size:1.6rem;font-weight:800;color:#f1f5f9;">WalletPro</h1>
      <p style="color:#64748b;font-size:.88rem;">Sign in to your account</p>
    </div>
    <div class="card-dark" style="padding:2rem;">
      {% for msg in messages %}<div class="alert alert-warning alert-dark mb-3" style="font-size:.85rem;">{{ msg }}</div>{% endfor %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label style="color:#94a3b8;font-size:.78rem;font-weight:600;margin-bottom:.4rem;display:block;letter-spacing:.06em;">EMAIL ADDRESS</label>
          <input type="email" name="username" class="form-control form-control-dark" placeholder="you@example.com" required>
        </div>
        <div class="mb-4">
          <label style="color:#94a3b8;font-size:.78rem;font-weight:600;margin-bottom:.4rem;display:block;letter-spacing:.06em;">PASSWORD</label>
          <input type="password" name="password" class="form-control form-control-dark" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="padding:.8rem;font-size:.95rem;">Sign In <i class="fas fa-arrow-right ms-1"></i></button>
      </form>
      <p style="text-align:center;margin-top:1.25rem;color:#64748b;font-size:.85rem;">No account? <a href="{% url 'accounts:register' %}" style="color:#a5b4fc;text-decoration:none;font-weight:600;">Register here</a></p>
    </div>
  </div>
</div>
{% endblock %}
